<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Reset Password - CMBank RSA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="js/console-guard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #003366;
            --primary-light: #0b5cab;
            --ok: #16a34a;
            --danger: #dc2626;
            --ink: #0f172a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(11, 92, 171, 0.12), transparent 36%),
                radial-gradient(circle at 85% 80%, rgba(0, 51, 102, 0.11), transparent 36%),
                linear-gradient(145deg, #f2f7ff 0%, #eef3fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            border: 1px solid #d9e3f2;
            box-shadow: 0 28px 48px rgba(0, 51, 102, 0.16);
            overflow: hidden;
        }
        .head {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: 24px;
            position: relative;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #dbeafe;
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .brand-logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.24);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }
        .head h1 {
            margin: 0;
            font-size: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .head p {
            margin: 8px 0 0;
            color: #dbeafe;
            font-size: 14px;
            line-height: 1.5;
        }
        .body { padding: 24px; }
        .group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            color: #334155;
            font-weight: 600;
        }
        .input-wrap {
            position: relative;
        }
        input {
            width: 100%;
            padding: 12px 42px 12px 13px;
            border: 1px solid #cbd5e1;
            border-radius: 11px;
            font-size: 14px;
            transition: border-color .2s ease, box-shadow .2s ease;
            color: var(--ink);
        }
        input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(11, 92, 171, 0.15);
        }
        .toggle-pass {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }
        .hint {
            margin-top: 6px;
            color: #64748b;
            font-size: 12px;
        }
        .btn {
            width: 100%;
            border: 0;
            border-radius: 11px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(11, 92, 171, 0.25);
        }
        .btn:disabled { opacity: 0.65; cursor: not-allowed; }
        .msg {
            margin-top: 14px;
            border-radius: 11px;
            padding: 10px 12px;
            font-size: 14px;
            display: none;
            line-height: 1.45;
        }
        .msg.show { display: block; }
        .msg.ok { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
        .msg.err { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
        .meter {
            height: 7px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
            margin-top: 8px;
        }
        .meter-fill {
            height: 100%;
            width: 0%;
            background: #ef4444;
            transition: width .2s ease, background .2s ease;
        }
        .foot {
            margin-top: 16px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
        .portal-chip {
            margin-top: 10px;
            text-align: center;
        }
        .portal-chip a {
            display: inline-block;
            text-decoration: none;
            color: #0b5cab;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .back {
            margin-top: 12px;
            text-align: center;
        }
        .back a {
            color: var(--primary-light);
            text-decoration: underline;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="head">
            <div class="brand">
                <div class="brand-logo"><i class="fas fa-landmark"></i></div>
                <span>CMBank RSA Portal</span>
            </div>
            <h1><i class="fas fa-shield-halved"></i> Reset Password</h1>
            <p>Set a strong new password for your CMBank RSA account and continue securely.</p>
        </div>
        <div class="body">
            <form id="resetPasswordForm">
                <div class="group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrap">
                        <input type="password" id="newPassword" minlength="6" maxlength="50" required>
                        <button type="button" class="toggle-pass" data-target="newPassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="meter"><div id="passwordStrengthBar" class="meter-fill"></div></div>
                    <div id="passwordStrengthText" class="hint">Use at least 6 characters.</div>
                </div>
                <div class="group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirmNewPassword" minlength="6" maxlength="50" required>
                        <button type="button" class="toggle-pass" data-target="confirmNewPassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" id="resetSubmitBtn">Reset Password</button>
            </form>
            <div id="resetMessage" class="msg"></div>
            <div class="foot">Minimum password length is 6 characters.</div>
            <div class="portal-chip"><a href="index.html">Go to CMBank RSA Portal</a></div>
            <div class="back"><a href="index.html">Back to Login</a></div>
        </div>
    </div>

    <script type="module" src="js/reset-password.js"></script>
</body>
</html>
